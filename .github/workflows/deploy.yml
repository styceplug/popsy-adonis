name: Deploy Website

on:
  push:
    branches:
      - main # Change this to 'master' if that is your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # (Optional) If your project requires a build step before deployment, add it here.
      # e.g., npm install && npm run build
      # And change the SOURCE below to your output folder (e.g., "dist/" or "build/")

      - name: Sync files to VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          SOURCE: "./"
          TARGET: "/var/www/popsyadonis.com/html"
          EXCLUDE: "/.git/, /.github/, /.next/, /node_modules/"
          SCRIPT_AFTER: |
            set -e
            cd /var/www/popsyadonis.com/html

            if [ -f /var/www/popsyadonis.com/.env ]; then
              cp /var/www/popsyadonis.com/.env .env
            fi

            npm ci
            npm run db:generate
            npm run build

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pm2 reload popsy-adonis --update-env || pm2 start npm --name popsy-adonis -- start
            pm2 save

            chown -R www-data:www-data /var/www/popsyadonis.com/html
            find /var/www/popsyadonis.com/html -type d -exec chmod 755 {} \;
            find /var/www/popsyadonis.com/html -type f -exec chmod 644 {} \;
